<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天选谁</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC","Microsoft YaHei",sans-serif;
        }
        body {
            background: #fff5f7;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .title {
            text-align: center;
            font-size: 50px;
            color: #ff5c8d;
            margin: 20px 0;
            font-weight: bold;
        }
        .subtitle {
            text-align: center;
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
        }
        .tip {
            text-align: center;
            color: #ff5c8d;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .star-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .star {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.2s;
        }
        .star:hover {
            transform: scale(1.05);
        }
        .star img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .star-name {
            padding: 10px;
            text-align: center;
            font-weight: 500;
        }
        #submitBtn {
            display: block;
            margin: 0 auto 30px;
            padding: 12px 40px;
            background: #ff5c8d;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
        }
        #submitBtn:disabled {
            background: #ccc;
        }
        .rank-box {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .rank-title {
            font-size: 22px;
            color: #ff5c8d;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        .rank-name {
            font-weight: 500;
        }
        .rank-count {
            color: #ff5c8d;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">今天选谁</div>
    <div class="subtitle">每天一票，实时排行榜</div>
    <div class="tip" id="tip">请选择你最喜欢的明星</div>

    <div class="star-grid" id="starGrid"></div>
    <button id="submitBtn" disabled>提交投票</button>

    <div class="rank-box">
        <div class="rank-title">📊 今日实时排名</div>
        <div id="rankList"></div>
    </div>
</div>

<script>
const stars = [
    { name: "肖战", img: "https://picsum.photos/seed/xiaozhan/300/400" },
    { name: "王一博", img: "https://picsum.photos/seed/wangyibo/300/400" },
    { name: "易烊千玺", img: "https://picsum.photos/seed/yiyangqianxi/300/400" },
    { name: "王俊凯", img: "https://picsum.photos/seed/wangjunkai/300/400" },
    { name: "王源", img: "https://picsum.photos/seed/wangyuan/300/400" },
    { name: "王鹤棣", img: "https://picsum.photos/seed/wanghedi/300/400" },
    { name: "吴磊", img: "https://picsum.photos/seed/wulei/300/400" },
    { name: "成毅", img: "https://picsum.photos/seed/chengyi/300/400" },
    { name: "邓为", img: "https://picsum.photos/seed/dengwei/300/400" },
    { name: "陈哲远", img: "https://picsum.photos/seed/chenzheyuan/300/400" },
    { name: "龚俊", img: "https://picsum.photos/seed/gongjun/300/400" },
    { name: "白敬亭", img: "https://picsum.photos/seed/baijingting/300/400" },
    { name: "朱一龙", img: "https://picsum.photos/seed/zhuyilong/300/400" },
    { name: "李现", img: "https://t14.baidu.com/it/u=148250014,3225842953&fm=225&app=113&f=JPEG?w=1440&h=810&s=D916C714550170E9D0D111680300A0F0" },
    { name: "刘宇宁", img: "https://picsum.photos/seed/liuyuning/300/400" },
    { name: "檀健次", img: "https://picsum.photos/seed/tanjianci/300/400" },
    { name: "张凌赫", img: "https://picsum.photos/seed/zhanglinghe/300/400" },
    { name: "张晚意", img: "https://picsum.photos/seed/zhangwanyi/300/400" },
    { name: "宋亚轩", img: "https://picsum.photos/seed/songyaxuan/300/400" },
    { name: "蔡徐坤", img: "https://picsum.photos/seed/caixukun/300/400" },
];

let selected = null;
const grid = document.getElementById("starGrid");

stars.forEach(star => {
    const el = document.createElement("div");
    el.className = "star";
    el.innerHTML = `<img src="${star.img}" alt="${star.name}"><div class="star-name">${star.name}</div>`;
    el.onclick = () => {
        selected = star.name;
        document.querySelectorAll(".star").forEach(s => s.style.border = "none");
        el.style.border = "3px solid #ff5c8d";
        document.getElementById("submitBtn").disabled = false;
        document.getElementById("tip").innerText = "你选择了：" + star.name;
    };
    grid.appendChild(el);
});

document.getElementById("submitBtn").onclick = function() {
    if (!selected) return;
    this.innerText = "投票成功！";
    this.disabled = true;
    setTimeout(() => this.innerText = "提交投票", 1500);
};
</script>
</body>
</html>
